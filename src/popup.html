<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZDFTranslate</title>
  <link rel="stylesheet" href="styles/popup.css">
</head>
<body>
  <div class="popup">

    <!-- 顶栏 -->
    <header class="popup-header">
      <div class="header-left">
        <img src="icons/icon48.png" alt="" class="header-logo">
        <span class="header-title">ZDF<span class="header-title-accent">Translate</span></span>
      </div>
      <div class="header-right">
        <a href="#" id="openOptions" class="header-btn" title="设置">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.6 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.6a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        </a>
        <span class="header-ver" id="popupVersion">v-</span>
      </div>
    </header>

    <!-- 语言选择 -->
    <section class="section">
      <div class="section-label">语言</div>
      <div class="lang-row">
        <div class="lang-pill">
          <select id="sourceLang">
            <option value="auto">自动检测</option>
            <option value="en">English</option>
            <option value="zh-CN">简体中文</option>
            <option value="zh-TW">繁體中文</option>
            <option value="ja">日本語</option>
            <option value="ko">한국어</option>
            <option value="fr">Français</option>
            <option value="de">Deutsch</option>
            <option value="es">Español</option>
            <option value="ru">Русский</option>
            <option value="pt">Português</option>
            <option value="ar">العربية</option>
            <option value="th">ไทย</option>
            <option value="vi">Tiếng Việt</option>
          </select>
        </div>
        <svg class="lang-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M13 6l6 6-6 6"/></svg>
        <div class="lang-pill">
          <select id="targetLang">
            <option value="zh-CN">简体中文</option>
            <option value="zh-TW">繁體中文</option>
            <option value="en">English</option>
            <option value="ja">日本語</option>
            <option value="ko">한국어</option>
            <option value="fr">Français</option>
            <option value="de">Deutsch</option>
            <option value="es">Español</option>
            <option value="ru">Русский</option>
            <option value="pt">Português</option>
            <option value="ar">العربية</option>
            <option value="th">ไทย</option>
            <option value="vi">Tiếng Việt</option>
          </select>
        </div>
      </div>
    </section>

    <!-- 翻译服务 -->
    <section class="section">
      <div class="section-label">翻译服务</div>
      <div class="service-card">
        <select id="translationService">
          <option value="microsoft-free">Microsoft Translator (Free)</option>
          <option value="google-free">Google Translate (Free)</option>
          <option value="aliyun">阿里百炼 (Qwen)</option>
          <option value="deepl">DeepL</option>
          <option value="gemini">Google Gemini</option>
          <option value="openrouter">OpenRouter</option>
          <option value="deepseek">DeepSeek</option>
          <option value="zhipu">智谱 GLM</option>
          <option value="kimi">Kimi (Moonshot)</option>
          <option value="openai">OpenAI</option>
          <option value="claude">Claude (Anthropic)</option>
        </select>
      </div>
    </section>

    <!-- 显示模式 -->
    <section class="section">
      <div class="section-label">显示模式</div>
      <div class="mode-tabs">
        <label class="mode-tab">
          <input type="radio" name="displayMode" value="bilingual" checked>
          <span class="mode-tab-inner">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 7h16M4 12h16M4 17h10"/></svg>
            双语对照
          </span>
        </label>
        <label class="mode-tab">
          <input type="radio" name="displayMode" value="replace">
          <span class="mode-tab-inner">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 7h16M4 12h10M4 17h14"/></svg>
            仅译文
          </span>
        </label>
      </div>
    </section>

    <!-- 状态提示 -->
    <div id="statusToast" class="status-toast"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
