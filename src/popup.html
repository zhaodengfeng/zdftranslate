<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZDFTranslate</title>
  <link rel="stylesheet" href="styles/popup.css">
</head>
<body>
  <div class="popup">

    <!-- Header -->
    <header class="popup-header">
      <div class="header-left">
        <img src="icons/icon48.png" alt="" class="header-logo">
        <span class="header-title">ZDFTranslate</span>
      </div>
      <div class="header-right">
        <a href="#" id="openOptions" class="header-btn" data-i18n-title="settings">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.6 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.6a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        </a>
        <span class="header-ver" id="popupVersion">v-</span>
      </div>
    </header>

    <!-- Hero Toggle -->
    <section class="section hero-section">
      <button id="translateToggle" class="hero-btn">
        <span class="hero-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 8l6 6"/><path d="M4 14l6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="M22 22l-5-10-5 10"/><path d="M14 18h6"/></svg>
        </span>
        <span class="hero-label" id="heroLabel" data-i18n="toastTranslating">翻译页面</span>
      </button>
    </section>

    <!-- Language -->
    <section class="section">
      <div class="section-label" data-i18n="language"></div>
      <div class="lang-row">
        <div class="lang-pill">
          <select id="sourceLang">
            <option value="auto" data-i18n="autoDetect">自动检测</option>
            <option value="en">English</option>
            <option value="zh-CN">简体中文</option>
            <option value="zh-TW">繁體中文</option>
            <option value="ja">日本語</option>
            <option value="ko">한국어</option>
            <option value="fr">Français</option>
            <option value="de">Deutsch</option>
            <option value="es">Español</option>
            <option value="ru">Русский</option>
            <option value="pt">Português</option>
            <option value="ar">العربية</option>
            <option value="th">ไทย</option>
            <option value="vi">Tiếng Việt</option>
          </select>
        </div>
        <button id="swapLangBtn" class="swap-btn" title="Swap">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M7 16l-4-4 4-4"/><path d="M17 8l4 4-4 4"/><path d="M3 12h18"/></svg>
        </button>
        <div class="lang-pill">
          <select id="targetLang">
            <option value="zh-CN">简体中文</option>
            <option value="zh-TW">繁體中文</option>
            <option value="en">English</option>
            <option value="ja">日本語</option>
            <option value="ko">한국어</option>
            <option value="fr">Français</option>
            <option value="de">Deutsch</option>
            <option value="es">Español</option>
            <option value="ru">Русский</option>
            <option value="pt">Português</option>
            <option value="ar">العربية</option>
            <option value="th">ไทย</option>
            <option value="vi">Tiếng Việt</option>
          </select>
        </div>
      </div>
    </section>

    <!-- Service -->
    <section class="section">
      <div class="section-label" data-i18n="translationService"></div>
      <div class="service-card">
        <select id="translationService">
          <optgroup label="Free">
            <option value="microsoft-free">Microsoft Translator (Free)</option>
            <option value="google-free">Google Translate (Free)</option>
          </optgroup>
          <optgroup label="Others">
            <option value="aliyun">阿里百炼 (Qwen)</option>
            <option value="deepl">DeepL</option>
            <option value="gemini">Google Gemini</option>
            <option value="openrouter">OpenRouter</option>
            <option value="deepseek">DeepSeek</option>
            <option value="zhipu">智谱 GLM</option>
            <option value="kimi">Kimi (Moonshot)</option>
            <option value="openai">OpenAI</option>
            <option value="claude">Claude (Anthropic)</option>
          </optgroup>
        </select>
      </div>
    </section>

    <!-- Display Mode -->
    <section class="section">
      <div class="section-label" data-i18n="displayMode"></div>
      <div class="mode-tabs">
        <label class="mode-tab">
          <input type="radio" name="displayMode" value="bilingual" checked>
          <span class="mode-tab-inner">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 7h16M4 12h16M4 17h10"/></svg>
            <span data-i18n="bilingual">双语对照</span>
          </span>
        </label>
        <label class="mode-tab">
          <input type="radio" name="displayMode" value="replace">
          <span class="mode-tab-inner">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 7h16M4 12h10M4 17h14"/></svg>
            <span data-i18n="translationOnly">仅译文</span>
          </span>
        </label>
      </div>
    </section>

    <div id="statusToast" class="status-toast"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
